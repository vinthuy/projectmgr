spring:
  application:
    name: workitem-system
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:workitem;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql
      continue-on-error: false
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.workitem.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: true
      logic-not-delete-value: false

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# CodeArts Req API配置
codearts:
  api:
    base-url: https://openapi.huaweicloud.com
    token: ${CODEARTS_API_TOKEN:your-api-token}
    project-id: ${CODEARTS_PROJECT_ID:your-project-id}

# Agent配置
agent:
  max-context-size: 10
  max-retry: 3
  timeout: 30000

# 通义千问API配置
qwen:
  api:
    key: ${QWEN_API_KEY:your-api-key}
    model: qwen-turbo
